project_name = "Cnav"
python_min   = "3.11"
generator_commit = "7ed715e7c09eb60644e13bfc6741f9ed6aea45f6"
archetypes = []
order = ["build", "dev", "deploy", "---", "test", "vet", "fmt", "clean", "docs"]

[commands.build]
desc ="Compile all packages"
run ="go build ./..."

[commands.dev]
desc ="Run cnav locally"
run ="go run ./cmd/cnav"

[commands.deploy]
desc ="Install cnav-bin to GOPATH/bin"
run ="go build -o ${GOPATH:-$HOME/go}/bin/cnav-bin ./cmd/cnav"

[commands.test]
desc ="Run all tests"
run ="go test ./..."

[commands.vet]
desc ="Run go vet"
run ="go vet ./..."

[commands.fmt]
desc ="Format source files"
run ="gofmt -w ."

[commands.clean]
desc ="Remove build artifacts"
run ="go clean ./..."

[commands.docs]
desc ="Browse package documentation"
run ="go doc ./..."

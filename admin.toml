project_name = "Cnav"
python_min   = "3.11"
generator_commit = "f072ebdd5b470117f6ff17f4a934d2c6c6230e89+dirty"
archetypes = []
order = ["build", "dev", "deploy", "---", "test", "vet", "fmt", "clean", "docs"]

[commands.build]
desc ="Compile all packages"
run ="go build ./..."

[commands.dev]
desc ="Run cnav locally"
run ="go run ./cmd/cnav"

[commands.deploy]
desc ="Install binaries into GOBIN"
run ="go install ./..."

[commands.test]
desc ="Run all tests"
run ="go test ./..."

[commands.vet]
desc ="Run go vet"
run ="go vet ./..."

[commands.fmt]
desc ="Format source files"
run ="gofmt -w ."

[commands.clean]
desc ="Remove build artifacts"
run ="go clean ./..."

[commands.docs]
desc ="Browse package documentation"
run ="go doc ./..."
